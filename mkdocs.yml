site_name: strands-sana
site_description: NVIDIA Sana text-to-image diffusion as Strands Agent tools
site_url: https://cagataycali.github.io/strands-sana
repo_url: https://github.com/cagataycali/strands-sana
repo_name: cagataycali/strands-sana

theme:
  name: material
  features:
    - navigation.tabs
    - navigation.sections
    - content.code.copy
    - content.code.annotate
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: deep purple
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: deep purple
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.tabbed
  - tables
  - toc:
      permalink: true

nav:
  - Home: index.md
  - API Reference: api.md
  - Coverage (DIFF): ../DIFF.md
